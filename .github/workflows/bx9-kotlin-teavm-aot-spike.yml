name: bx9-kotlin-teavm-aot-spike

# TEMPORARY feasibility spike for Bx-9 (Kotlin). Question: can TeaVM AOT-compile the Kotlin
# compiler (kotlinc) to WebAssembly, so we could vendor a prebuilt kotlinc runtime?
#
# This runs automatically when the spike branch is pushed (and can be re-run manually via the
# Actions "Run workflow" button once it is on the default branch). It is scoped to the spike
# branch only, so it never runs on main or on pull requests, and is NOT part of the CI gate.
# It is expected to FAIL, and to fail informatively: the payoff is the error log, uploaded as
# an artifact. Precedent: a community attempt to AOT the Dotty (Scala 3) compiler with TeaVM
# produced ~1,600 unsupported-API errors and no usable output. kotlinc (reflection /
# ServiceLoader / JNI heavy, ~30k classes) is the same class of input, so expect a similar wall.
#
# Approach: a real javac (via the Maven compile phase) compiles a tiny Main wrapper against the
# kotlin jars; then teavm-maven-plugin (0.15.0, the current/supported TeaVM tooling on Maven
# Central -- teavm-cli is not published at 0.15.0) AOT-compiles the reachable graph. Running
# TeaVM on the JVM sidesteps the browser JS-call-stack ceiling. Target is JS: it exercises the
# same whole-program dependency analysis + unsupported-API checks that decide feasibility, so
# if kotlinc's graph is going to break TeaVM, it breaks here (wasm-gc is a follow-up config once
# the graph survives). We still clone teavm-javac to print the TeaVM version it pins.

on:
  push:
    branches: [ "spike/bx9-kotlin-teavm-aot" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  aot:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MAVEN_OPTS: "-Xss256m -Xmx6g"
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Clone teavm-javac (reference; print its pinned TeaVM version)
        run: |
          git clone --depth 1 https://github.com/konsoletyper/teavm-javac.git tj-src || true
          echo "---- teavm-javac gradle.properties ----"
          cat tj-src/gradle.properties 2>/dev/null || echo "(gradle.properties not found)"

      - name: Generate the Maven project (wrapper + teavm-maven-plugin)
        run: |
          set -x
          mkdir -p src/main/java
          cat > src/main/java/Main.java <<'JAVA'
          public class Main {
              public static void main(String[] args) throws Exception {
                  org.jetbrains.kotlin.cli.jvm.K2JVMCompiler.main(args);
              }
          }
          JAVA
          cat > pom.xml <<'POM'
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>glifex.spike</groupId>
            <artifactId>bx9-kotlin-teavm</artifactId>
            <version>0</version>
            <packaging>jar</packaging>
            <properties>
              <maven.compiler.release>21</maven.compiler.release>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
            </properties>
            <dependencies>
              <dependency><groupId>org.jetbrains.kotlin</groupId><artifactId>kotlin-compiler-embeddable</artifactId><version>2.4.10</version></dependency>
              <dependency><groupId>org.jetbrains.kotlin</groupId><artifactId>kotlin-stdlib</artifactId><version>2.4.10</version></dependency>
              <dependency><groupId>org.jetbrains.kotlin</groupId><artifactId>kotlin-reflect</artifactId><version>2.4.10</version></dependency>
              <dependency><groupId>org.jetbrains.kotlin</groupId><artifactId>kotlin-script-runtime</artifactId><version>2.4.10</version></dependency>
              <dependency><groupId>org.teavm</groupId><artifactId>teavm-classlib</artifactId><version>0.15.0</version></dependency>
            </dependencies>
            <build>
              <plugins>
                <plugin>
                  <groupId>org.teavm</groupId>
                  <artifactId>teavm-maven-plugin</artifactId>
                  <version>0.15.0</version>
                  <executions>
                    <execution>
                      <id>aot</id>
                      <goals><goal>compile</goal></goals>
                      <phase>process-classes</phase>
                      <configuration>
                        <mainClass>Main</mainClass>
                        <optimizationLevel>SIMPLE</optimizationLevel>
                      </configuration>
                    </execution>
                  </executions>
                </plugin>
              </plugins>
            </build>
          </project>
          POM
          echo "---- pom.xml ----"; cat pom.xml

      - name: Describe the teavm plugin goal (capture available parameters)
        run: |
          mvn -B -q org.teavm:teavm-maven-plugin:0.15.0:help -Ddetail=true -Dgoal=compile 2>&1 | tee teavm-goal-help.txt || true

      - name: Attempt TeaVM AOT of kotlinc (expected to fail with many errors)
        continue-on-error: true
        run: |
          set -x
          timeout 3000 mvn -B -e process-classes > teavm-maven.log 2>&1 || true
          echo "maven exit; error/exception lines: $(grep -c -iE 'error|exception' teavm-maven.log 2>/dev/null || echo NA)"
          echo "---- tail of teavm-maven.log ----"
          tail -160 teavm-maven.log || true
          echo "---- any generated output ----"
          find target -type f 2>/dev/null | head -60 || true

      - name: Upload spike output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bx9-kotlin-teavm-aot
          path: |
            teavm-maven.log
            teavm-goal-help.txt
            pom.xml
            src/main/java/Main.java
            target/**
          if-no-files-found: warn
