name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Stage 1: fast checks — fail in seconds, not minutes ─────────────
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with: { python-version: "3.13" }
      - name: Ruff (Python lint + format check)
        run: |
          pip install ruff==0.15.20   # pinned: new ruff releases add rules; bump deliberately
          ruff check glifex.py
          ruff format --check glifex.py
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with: { node-version: "24" }
      - name: Biome (JS/TS lint + format check)
        run: npx --yes @biomejs/biome@2.5.4 check web/ languages/templates/ || true   # pinned: new biome releases add rules; bump deliberately
        # '|| true' until the codebase is Biome-formatted; flip to blocking then.
      - name: Asset-stamp transform test
        run: node web/stamp.test.mjs

  corpus:
    timeout-minutes: 15
    name: Playground corpus is not stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with: { node-version: "24" }
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with: { python-version: "3.13" }
      - name: Harness drift gate (copies must equal templates)
        run: python3 glifex.py sync-harnesses --check
      - name: Rebuild corpus and diff against committed
        run: |
          node web/build.mjs
          git diff --exit-code -I '"generatedAt"' web/problems.generated.json \
            || (echo "::error::web/problems.generated.json is stale — run 'node web/build.mjs' and commit" && exit 1)
      - name: Corpus integrity (declared+runnable languages are baked)
        run: node web/corpus-integrity.test.mjs
      - name: Vendor pipelines are in sync
        run: node web/vendor-sync.test.mjs
      - name: Lab ladders cap det-tier tracks
        run: node web/lab-ladder.test.mjs
      - name: Complexity Lab engine battery (L1)
        run: node web/lab-engine.test.mjs
      - name: JS runtime battery (compile-once/measure-many)
        run: node web/js-runtime.test.mjs
      - name: Retro 8080 core (unit battery + fast CP/M diagnostics, <5s)
        run: |
          node web/retro/cpu8080.test.mjs
          node web/retro/harness8080.mjs --suite web/retro/test-roms/8080 --quiet

  # ── Stage 2: the core promise — every problem, every language, 3 OSes ──
  matrix:
    timeout-minutes: 40
    name: glifex test (${{ matrix.os }})
    needs: [lint, corpus]
    permissions:
      contents: read
      pull-requests: read   # read changed-file list to skip the CLI matrix on browser/docs-only changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Determine if this change is irrelevant to the CLI matrix (gates the steps below)
        id: scope
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # matrix_skippable=true ONLY when every changed file is provably irrelevant
          # to `glifex.py test/verify/db test` -- i.e. under the browser/docs/meta
          # safelist below. Anything else (glifex.py, languages/, problems/,
          # problems-db/, .github/, build files, unknown paths) -> false (run).
          # Any uncertainty (API error, empty list, unknown event) -> false.
          # Gates ONLY this job's steps; other jobs (e2e, playground) are unaffected.
          set -uo pipefail
          files=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' 2>/dev/null)" || files="__ERR__"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            case "$base" in *[!0]*) : ;; *) base="" ;; esac
            if [ -n "$base" ]; then
              files="$(gh api "repos/${{ github.repository }}/compare/${base}...${{ github.sha }}" --jq '.files[].filename' 2>/dev/null)" || files="__ERR__"
            else
              files="__ERR__"
            fi
          else
            files="__ERR__"
          fi
          if [ "$files" = "__ERR__" ] || [ -z "$files" ]; then
            echo "changed-file list unavailable/empty -- running the CLI matrix to be safe"
            echo "matrix_skippable=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          relevant="$(printf '%s\n' "$files" | grep -vE '^docs/|\.md$|^web/|^e2e/|^problems-fe/|^retro/|^tools/|^\.vscode/|^\.devcontainer/|^\.editorconfig$|^\.gitattributes$|^\.gitignore$|^\.pre-commit-config\.yaml$|^LICENSE$' || true)"
          if [ -z "$relevant" ]; then
            echo "no CLI-relevant files changed -- the glifex test matrix will be skipped:"
            printf '%s\n' "$files" | sed 's/^/  skip: /'
            echo "matrix_skippable=true" >> "$GITHUB_OUTPUT"
          else
            echo "CLI-relevant files changed -- the matrix will run. Relevant files:"
            printf '%s\n' "$relevant" | sed 's/^/  run:  /'
            echo "matrix_skippable=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { python-version: "3.13" }
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { node-version: "24" }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { go-version: "1.25" }
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { distribution: temurin, java-version: "25" }
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600  # v1
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { ruby-version: "3.4" }
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { dotnet-version: "10.0.x" }
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable
        if: steps.scope.outputs.matrix_skippable != 'true'
        with:
          toolchain: stable
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { php-version: "8.4" }
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260  # v1
        if: steps.scope.outputs.matrix_skippable != 'true'
      - uses: mlugg/setup-zig@53fc45b17fe98b52f92ee5ea08ff48a85a3e7eb7  # v1
        if: steps.scope.outputs.matrix_skippable != 'true'
        with: { version: "0.14.0" }
      # C/C++ use the runners' system compilers (gcc/clang preinstalled on
      # ubuntu/macos; Windows runners include MinGW gcc — doctor skips if absent)
      - name: TypeScript
        if: steps.scope.outputs.matrix_skippable != 'true'
        run: npm install -g typescript@7.0.2   # pinned; bump deliberately
      - name: WABT (WebAssembly Text toolchain)
        if: steps.scope.outputs.matrix_skippable != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update -qq && sudo apt-get install -y wabt; fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install wabt; fi
          # Windows: wabt not installed — wat skips honestly on that leg
      - name: Toolchain report
        if: steps.scope.outputs.matrix_skippable != 'true'
        run: python3 glifex.py doctor || python glifex.py doctor
        shell: bash
      - name: Test all problems, all installed languages
        if: steps.scope.outputs.matrix_skippable != 'true'
        shell: bash
        run: |
          PY=python3; command -v python3 >/dev/null || PY=python
          for p in problems/*/; do
            $PY glifex.py test "$(basename "$p")"
          done
      - name: Verify manifests + reference variants (glifex verify)
        if: steps.scope.outputs.matrix_skippable != 'true'
        shell: bash
        run: |
          PY=python3; command -v python3 >/dev/null || PY=python
          for p in problems/*/; do
            $PY glifex.py verify "$(basename "$p")"
          done
      - name: Database track (SQLite engine)
        if: steps.scope.outputs.matrix_skippable != 'true'
        shell: bash
        run: |
          PY=python3; command -v python3 >/dev/null || PY=python
          for p in problems-db/*/; do
            $PY glifex.py db test "$(basename "$p")"
          done

  # ── Stage 3: the playground engine runs the same corpus ─────────────
  playground:
    timeout-minutes: 15
    needs: [corpus]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with: { node-version: "24" }
      - name: Browser JS engine executes the corpus green
        run: |
          node web/build.mjs
          node -e '
            const { runJavaScript } = require("./web/js-runtime.js");
            const c = require("./web/problems.generated.json");
            let ok = true;
            for (const p of c.problems.filter(x => x.track === "algorithm" && x.worked)) {
              const o = runJavaScript(p.languages.javascript.practice, p.cases);
              const pass = !o.error && o.results.every(r => r.ok);
              console.log((pass ? "GREEN " : "RED   ") + p.id);
              ok = ok && pass;
            }
            process.exit(ok ? 0 : 1);'

  # ── Stage 4: E2E — real browsers, including the offline guarantee ────
  e2e:
    timeout-minutes: 45
    needs: [playground]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # read changed-file list to skip the e2e test step on docs-only changes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with: { node-version: "24" }
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with: { dotnet-version: "10.0.x" }
      - name: Restore Playwright browsers + npm
        id: pw-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.npm
          key: playwright-${{ runner.os }}-1.61.1
      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm install -D @playwright/test@1.61.1
          # browsers restored from cache on hit -> this becomes a fast no-op verify;
          # --with-deps still ensures the OS libs. Cache key is the pinned version.
          npx playwright install chromium firefox
      - name: Save Playwright browsers + npm (main only)
        id: pw-cache-save
        if: always() && github.ref == 'refs/heads/main' && steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.npm
          key: playwright-${{ runner.os }}-1.61.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with: { go-version: "1.25" }
      - name: Restore vendored runtimes cache
        id: vendor
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: web/vendor
          key: vendor-${{ hashFiles('web/fetch-runtimes.mjs', 'tools/**', 'web/runtime-hashes.json', 'web/csharp-runtime/*.cs', 'web/csharp-runtime/*.csproj') }}
      - name: Vendor WASM runtimes (Python/Ruby/TypeScript/Postgres)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          ok=0; for i in 1 2 3; do node web/fetch-runtimes.mjs && { ok=1; break; }; rc=$?; [ "$rc" = 3 ] && { echo "fetch-runtimes: integrity failure (rc=3) -- not retrying"; break; }; echo "fetch-runtimes attempt $i failed (rc=$rc); retry 20s"; sleep 20; done; [ "$ok" = 1 ]
      - name: Vendor C toolchain (@wasmer/sdk + clang.webc)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          mkdir -p web/vendor/c
          . tools/vendor-pins.env
          npm pack @wasmer/sdk@${WASMER_SDK_VERSION}
          tar xzf wasmer-sdk-*.tgz
          cp -r package/dist/. web/vendor/c/
          rm -rf package wasmer-sdk-*.tgz
          curl --retry 5 --retry-delay 15 --retry-all-errors https://get.wasmer.io -sSfL | sh
          export PATH="$HOME/.wasmer/bin:$PATH"
          ok=0; for i in 1 2 3 4 5; do wasmer package download "clang/clang@${WASMER_CLANG_VERSION}" -o web/vendor/c/clang.webc && { ok=1; break; }; echo "wasmer download attempt $i failed; retrying in 15s"; sleep 15; done; [ "$ok" = 1 ]
          echo "$WASMER_CLANG_SHA256  web/vendor/c/clang.webc" | sha256sum -c -
          echo '{"runtime":"c","via":"wasmer"}' > web/vendor/c/manifest.json
          ls -la web/vendor/c
      - name: Vendor C++ toolchain (Binji wasm-clang)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          mkdir -p web/vendor/cpp
          . tools/vendor-pins.env
          BASE=https://raw.githubusercontent.com/binji/wasm-clang/${BINJI_WASM_CLANG_REF}
          for f in clang lld memfs sysroot.tar shared.js worker.js; do
            curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/$f" -o "web/vendor/cpp/$f"
          done
          # Binji's Memory.check() refreshes only on detachment; also refresh on
          # buffer-identity change so growing the app's wasm memory during a large
          # fread doesn't leave copy_out viewing a stale/too-small ArrayBuffer.
          sed -i 's/if (this.buffer.byteLength === 0) {/if (this.buffer !== this.memory.buffer || this.buffer.byteLength === 0) {/' web/vendor/cpp/shared.js
          grep -q 'this.buffer !== this.memory.buffer' web/vendor/cpp/shared.js || { echo 'shared.js check() patch failed'; exit 1; }
          echo '{"runtime":"cpp","via":"binji-wasm-clang","clang":"8.0.1","std":"c++17"}' > web/vendor/cpp/manifest.json
          ls -la web/vendor/cpp
          test "$(stat -c%s web/vendor/cpp/clang)" -gt 1000000 || { echo "clang too small (LFS pointer?)"; exit 1; }
      - name: Vendor C# runtime (.NET-wasm + Roslyn via dotnet publish)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          dotnet workload install wasm-tools
          dotnet publish web/csharp-runtime/runner.csproj -c Release -o /tmp/cspub >/dev/null
          DJS=$(find web/csharp-runtime -path '*/AppBundle/*' -name dotnet.js 2>/dev/null | head -1 || true)
          test -n "$DJS" || { echo "AppBundle dotnet.js not found after publish"; exit 1; }
          FW=$(dirname "$DJS")
          mkdir -p web/vendor/csharp
          cp -r "$FW"/. web/vendor/csharp/
          echo '{"runtime":"csharp","via":"dotnet-wasm+roslyn","dotnet":"10.0"}' > web/vendor/csharp/manifest.json
          ls -la web/vendor/csharp | head
          test "$(stat -c%s web/vendor/csharp/dotnet.native.wasm)" -gt 1000000 || { echo "dotnet.native.wasm too small (publish failed?)"; exit 1; }
      - name: Vendor Rust runtime (Miri-in-wasm via Rubri)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          . tools/vendor-pins.env
          rm -rf /tmp/rubri && mkdir -p /tmp/rubri && git -C /tmp/rubri init -q
          git -C /tmp/rubri remote add origin https://github.com/LyonSyonII/rubri
          git -C /tmp/rubri fetch -q --depth 1 origin "$RUBRI_REF"
          git -C /tmp/rubri checkout -q FETCH_HEAD
          SRC=/tmp/rubri/example/public/wasm-rustc
          LIB=web/vendor/rust/wasm-rustc/lib/rustlib/x86_64-unknown-linux-gnu/lib
          mkdir -p web/vendor/rust/wasm-rustc/bin "$LIB"
          cp "$SRC"/bin/miri.opt.*.wasm web/vendor/rust/wasm-rustc/bin/miri.wasm
          MIN="libaddr2line-b8754aeb03c02354.rlib libadler-05c3545f6cd12159.rlib liballoc-0dab879bc41cd6bd.rlib libcfg_if-c7fd2cef50341546.rlib libcompiler_builtins-a99947d020d809d6.rlib libcore-4b8e8a815d049db3.rlib libgimli-598847d27d7a3cbf.rlib libhashbrown-d2ff91fdf93cacb2.rlib liblibc-dc63949c664c3fce.rlib libmemchr-2d3a423be1a6cb96.rlib libminiz_oxide-b109506a0ccc4c6a.rlib libobject-7b48def7544c748b.rlib libpanic_abort-c93441899b93b849.rlib libpanic_unwind-11d9ba05b60bf694.rlib librustc_demangle-59342a335246393d.rlib librustc_std_workspace_alloc-552b185085090ff6.rlib librustc_std_workspace_core-5d8a121daa7eeaa9.rlib librustc_std_workspace_std-97f43841ce452f7d.rlib libstd-bdedb7706a556da2.rlib libstd-bdedb7706a556da2.so libstd_detect-cca21eebc4281add.rlib libsysroot-f654e185be3ffebd.rlib libunwind-747b693f90af9445.rlib"
          for f in $MIN; do cp "$SRC/lib/rustlib/x86_64-unknown-linux-gnu/lib/$f" "$LIB/$f"; done
          echo '{"runtime":"rust","via":"miri-wasm (rubri/bjorn3)","rust":"1.78.0-dev","edition":"2021"}' > web/vendor/rust/manifest.json
          test "$(stat -c%s web/vendor/rust/wasm-rustc/bin/miri.wasm)" -gt 1000000 || { echo "miri.wasm too small"; exit 1; }
          N=$(find web/vendor/rust/wasm-rustc -type f | wc -l); echo "rust vendor files: $N"; test "$N" -eq 24
      - name: Vendor Go toolchain (gc self-hosted to wasip1/wasm)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          bash tools/go-vendor.sh web/vendor/go
          du -sh web/vendor | sed 's/^/all vendored runtimes: /'
      - name: Vendor x86-64 toolchain (robalb/x86-64-playground, pinned)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          mkdir -p web/vendor/asm-x86_64
          . tools/vendor-pins.env
          REF=${X86_64_PLAYGROUND_REF}
          BASE="https://raw.githubusercontent.com/robalb/x86-64-playground/$REF/webapp/src/assets"
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/blinkenlib.js"                 -o web/vendor/asm-x86_64/blinkenlib.js
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/blinkenlib.wasm"               -o web/vendor/asm-x86_64/blinkenlib.wasm
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/assemblers/gnu-as.2.43.50.elf" -o web/vendor/asm-x86_64/gnu-as.elf
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/assemblers/gnu-ld.2.43.50.elf" -o web/vendor/asm-x86_64/gnu-ld.elf
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "https://raw.githubusercontent.com/robalb/x86-64-playground/$REF/LICENSE.txt" -o web/vendor/asm-x86_64/LICENSE-blink
          echo "687b3d3cb033175d245c324c394d4587d9f459fb4f732eb2b340c097a8619063  web/vendor/asm-x86_64/blinkenlib.js"   | sha256sum -c -
          echo "dd409970974929ab04d6b45978df01140d63ad2054ba7a550b6259e0a07f476a  web/vendor/asm-x86_64/blinkenlib.wasm" | sha256sum -c -
          echo "908b557e21e8000596abe12828d929cf82dd9abcc3ee840dbaf9c503d8e32534  web/vendor/asm-x86_64/gnu-as.elf"      | sha256sum -c -
          echo "8548fc86b738be62619889560995a127a9be6026ed4d6b21fe525c184d322206  web/vendor/asm-x86_64/gnu-ld.elf"      | sha256sum -c -
          test "$(stat -c%s web/vendor/asm-x86_64/gnu-ld.elf)" -gt 1000000 || { echo "gnu-ld.elf too small (fetch failed?)"; exit 1; }
          echo "{\"runtime\":\"asm-x86_64\",\"via\":\"robalb/x86-64-playground@$REF\",\"blink\":\"ISC\",\"binutils\":\"2.43.50 (GPL-3.0)\"}" > web/vendor/asm-x86_64/manifest.json
      - name: Resolve emsdk version pin
        id: emsdkver
        run: |
          . tools/arm64-toolchain/pins.env
          echo "v=$EMSDK_VERSION" >> "$GITHUB_OUTPUT"
      - name: Restore emsdk (survives vendor-cache busts; keyed on EMSDK_VERSION)
        id: emsdk-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: ~/emsdk
          key: emsdk-${{ steps.emsdkver.outputs.v }}
      - name: Save emsdk (main only)
        if: always() && github.ref == 'refs/heads/main' && steps.emsdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: ~/emsdk
          key: emsdk-${{ steps.emsdkver.outputs.v }}
      - name: Vendor arm64 toolchain (VIXL wasm32 + musl binutils, pinned)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          sudo apt-get update
          sudo apt-get install -y musl-tools binutils-aarch64-linux-gnu texinfo bison flex
          . tools/arm64-toolchain/pins.env
          if [ ! -d "$HOME/emsdk" ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
            (cd "$HOME/emsdk" && ./emsdk install "$EMSDK_VERSION" && ./emsdk activate "$EMSDK_VERSION")
          fi
          . "$HOME/emsdk/emsdk_env.sh"
          mkdir -p web/vendor/asm-arm64
          bash tools/arm64-toolchain/build-binutils.sh "$PWD/web/vendor/asm-arm64"
          bash tools/arm64-toolchain/build-vixl.sh     "$PWD/web/vendor/asm-arm64"
          BASE="https://raw.githubusercontent.com/robalb/x86-64-playground/$BLINKENLIB_REF/webapp/src/assets"
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/blinkenlib.js"   -o web/vendor/asm-arm64/blinkenlib.js
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/blinkenlib.wasm" -o web/vendor/asm-arm64/blinkenlib.wasm
          echo "$BLINKENLIB_JS_SHA256  web/vendor/asm-arm64/blinkenlib.js"   | sha256sum -c -
          echo "$BLINKENLIB_WASM_SHA256  web/vendor/asm-arm64/blinkenlib.wasm" | sha256sum -c -
          echo "{\"runtime\":\"asm-arm64\",\"vixl\":\"$VIXL_COMMIT\",\"binutils\":\"$BINUTILS_VERSION (musl-static, GPL-3.0, guest)\",\"blink\":\"ISC\",\"vixl_license\":\"BSD-3-Clause\"}" > web/vendor/asm-arm64/manifest.json
          rm -f web/vendor/asm-arm64/binutils-configure.log web/vendor/asm-arm64/binutils-make.log
          ls -la web/vendor/asm-arm64
          test "$(stat -c%s web/vendor/asm-arm64/gx_vixl.wasm)" -gt 1000000 || { echo "gx_vixl.wasm too small"; exit 1; }
          test "$(stat -c%s web/vendor/asm-arm64/aarch64-as.elf)" -gt 1000000 || { echo "aarch64-as.elf too small"; exit 1; }
          # A size check proves the fetch worked, not that the runtime is CORRECT.
          # The guest stack being 1 MB is a RUNTIME property: the source says
          # 1 << 20, but only the artifact can say what it does. If it ever
          # silently reverts to VIXL's 8 KB default, 002's hash table breaks
          # around n=256 and looks like a hash bug, not a stack bug.
          node tools/arm64-toolchain/verify-stack.mjs web/vendor/asm-arm64
      - name: Vendor riscv64 toolchain (libriscv wasm32 + musl binutils, pinned)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          sudo apt-get install -y binutils-riscv64-linux-gnu >/dev/null
          . tools/riscv-toolchain/pins.env
          if [ ! -d "$HOME/emsdk" ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
            (cd "$HOME/emsdk" && ./emsdk install "$EMSDK_VERSION" && ./emsdk activate "$EMSDK_VERSION")
          fi
          . "$HOME/emsdk/emsdk_env.sh"
          export EMSDK="$HOME/emsdk"
          mkdir -p web/vendor/asm-riscv64
          bash tools/riscv-toolchain/build-binutils.sh "$PWD/web/vendor/asm-riscv64"
          bash tools/riscv-toolchain/build-libriscv.sh "$PWD/web/vendor/asm-riscv64"
          BASE="https://raw.githubusercontent.com/robalb/x86-64-playground/$BLINKENLIB_REF/webapp/src/assets"
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/blinkenlib.js"   -o web/vendor/asm-riscv64/blinkenlib.js
          curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "$BASE/blinkenlib.wasm" -o web/vendor/asm-riscv64/blinkenlib.wasm
          echo "$BLINKENLIB_JS_SHA256  web/vendor/asm-riscv64/blinkenlib.js"   | sha256sum -c -
          echo "$BLINKENLIB_WASM_SHA256  web/vendor/asm-riscv64/blinkenlib.wasm" | sha256sum -c -
          echo "{\"runtime\":\"asm-riscv64\",\"libriscv\":\"$LIBRISCV_COMMIT\",\"binutils\":\"$BINUTILS_VERSION (musl-static, GPL-3.0, guest)\",\"blink\":\"ISC\",\"libriscv_license\":\"BSD-3-Clause\",\"ext_c\":\"ON (mandatory)\"}" > web/vendor/asm-riscv64/manifest.json
          rm -f web/vendor/asm-riscv64/binutils-configure.log web/vendor/asm-riscv64/binutils-make.log web/vendor/asm-riscv64/libriscv-*.log
          ls -la web/vendor/asm-riscv64
          test "$(stat -c%s web/vendor/asm-riscv64/gx_rv.wasm)" -gt 100000 || { echo "gx_rv.wasm too small"; exit 1; }
          test "$(stat -c%s web/vendor/asm-riscv64/riscv64-as.elf)" -gt 1000000 || { echo "riscv64-as.elf too small"; exit 1; }
          # A size check proves the fetch worked, not that the runtime is CORRECT.
          # RISCV_EXT_C=OFF fails at ELF LOAD, so only running something catches it.
          node tools/riscv-toolchain/verify-riscv.mjs web/vendor/asm-riscv64
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260  # v1
        with:
          sdk: "3.12.2"   # pins.env DART_SDK_VERSION. NOT "stable" -- a pin that
                          # drifts is a cache key that lies. See tools/dart-toolchain/pins.env.
      - name: Vendor Dart toolchain (dart2js self-hosted to JS, pinned + patched)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          . tools/dart-toolchain/pins.env
          mkdir -p web/vendor/dart
          bash tools/dart-toolchain/build-dart2js.sh "$PWD/web/vendor/dart"
          ls -la web/vendor/dart
          # Size proves the build emitted bytes. It does NOT prove the compiler
          # works: without the kernel patch gx_web.js is exactly the right size
          # and compiles nothing, dying in _js_interop_checks before any work.
          # Only running it catches that.
          node tools/dart-toolchain/verify-dart.mjs web/vendor/dart
      # A SEPARATE step, deliberately outside the vendor step's cache guard.
      # web/vendor is keyed on hashFiles(fetch-runtimes.mjs, tools/**, ci.yml) --
      # which does NOT include web/dart-core.mjs. Inside the guard, a PR that
      # touched only the worker would hit the cache, skip the step, and go green
      # without the worker ever running. That is the shape of the regression
      # Decision 10 records. Out here it runs on hit and miss alike, against the
      # artifacts the cache just restored.
      - name: Determine if anything dart-relevant changed (gates the dart verify below)
        id: dart-scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # dart_touched=true if any changed file feeds the dart integration verify
          # below: web/dart-core.mjs (the core it drives), the harness itself, or any
          # problem's test_cases.json / dart solution. Any uncertainty (API error,
          # empty/unknown event) -> true, so the verify runs. Combined with the vendor
          # cache-hit signal, the verify is skipped ONLY when the compiler is cached
          # AND no dart input moved. (Toolchain/build changes bust the vendor key, so
          # they surface as a cache miss and are already covered by that signal.)
          set -uo pipefail
          files=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' 2>/dev/null)" || files="__ERR__"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            case "$base" in *[!0]*) : ;; *) base="" ;; esac   # all-zero base (new ref) -> unknown
            if [ -n "$base" ]; then
              files="$(gh api "repos/${{ github.repository }}/compare/${base}...${{ github.sha }}" --jq '.files[].filename' 2>/dev/null)" || files="__ERR__"
            else
              files="__ERR__"
            fi
          else
            files="__ERR__"
          fi
          if [ "$files" = "__ERR__" ] || [ -z "$files" ]; then
            echo "changed-file list unavailable/empty -- running the dart verify to be safe"
            echo "dart_touched=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          dart="$(printf '%s\n' "$files" | grep -E '^web/dart-core\.mjs$|^tools/dart-toolchain/verify-dart-worker\.mjs$|^problems/[^/]+/test_cases\.json$|^problems/[^/]+/dart/.*\.dart$' || true)"
          if [ -n "$dart" ]; then
            echo "dart-relevant changes -- the dart verify will run:"
            printf '%s\n' "$dart" | sed 's/^/  dart: /'
            echo "dart_touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "no dart-relevant changes -- dart verify skips if the compiler is cached"
            echo "dart_touched=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify the Dart core against the real compiler and the real corpus
        if: steps.vendor.outputs.cache-hit != 'true' || steps.dart-scope.outputs.dart_touched == 'true'
        run: node tools/dart-toolchain/verify-dart-worker.mjs web/vendor/dart
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with: { distribution: temurin, java-version: "25" }   # pins.env TEAVM_JAVAC_JDK.
                                                              # NOT the README's 21: settings.gradle
                                                              # sets VERSION_25 and :javac compiles
                                                              # jdk25u source. build-teavm-javac.sh
                                                              # refuses if these disagree.
      - name: Vendor Java toolchain (teavm-javac built from pinned source)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          . tools/java-toolchain/pins.env
          mkdir -p web/vendor/java
          bash tools/java-toolchain/build-teavm-javac.sh "$PWD/web/vendor/java"
          ls -la web/vendor/java
          # Size proves the build emitted bytes. It does NOT prove the compiler
          # works -- that is what took Java four rounds to establish. Only
          # compiling a kata and running the output catches a compiler that
          # builds to exactly the right size and compiles nothing.
          node tools/java-toolchain/verify-java.mjs web/vendor/java
      - name: Vendor asm-6502 (customasm built from pinned source)
        run: |
          if [ -f web/vendor/.vendor-complete ]; then echo "vendor cache hit -- skipping"; exit 0; fi
          . tools/customasm-toolchain/pins.env
          mkdir -p web/vendor/asm-6502
          bash tools/customasm-toolchain/build-customasm.sh "$PWD/web/vendor/asm-6502"
          ls -la web/vendor/asm-6502
          # Magic + size prove bytes; only assembling a program proves the wasm is
          # the assembler the retro worker can actually drive.
          node tools/customasm-toolchain/verify-customasm.mjs web/vendor/asm-6502
      - name: Mark vendor complete (cached for future runs)
        run: touch web/vendor/.vendor-complete
      - name: Verify vendored runtime integrity
        run: node web/fetch-runtimes.mjs --verify
      - name: Save vendored runtimes cache
        if: always() && github.ref == 'refs/heads/main' && steps.vendor.outputs.cache-hit != 'true' && hashFiles('web/vendor/.vendor-complete') != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: web/vendor
          key: vendor-${{ hashFiles('web/fetch-runtimes.mjs', 'tools/**', 'web/runtime-hashes.json', 'web/csharp-runtime/*.cs', 'web/csharp-runtime/*.csproj') }}
      - name: Determine if the change is docs-only (gates the e2e test step below)
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sets docs_only=true ONLY when every changed file is under docs/ or ends
          # in .md. Any uncertainty (API error, empty/'.' list, unknown event) ->
          # false, so e2e runs. This gates ONLY the test step below; the rest of the
          # job (vendor, emsdk, --verify, cache save) is unaffected.
          set -uo pipefail
          files=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' 2>/dev/null)" || files="__ERR__"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            case "$base" in *[!0]*) : ;; *) base="" ;; esac   # all-zero base (new ref) -> unknown
            if [ -n "$base" ]; then
              files="$(gh api "repos/${{ github.repository }}/compare/${base}...${{ github.sha }}" --jq '.files[].filename' 2>/dev/null)" || files="__ERR__"
            else
              files="__ERR__"
            fi
          else
            files="__ERR__"
          fi
          if [ "$files" = "__ERR__" ] || [ -z "$files" ]; then
            echo "changed-file list unavailable/empty -- running e2e to be safe"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          nondocs="$(printf '%s\n' "$files" | grep -vE '^docs/|\.md$' || true)"
          if [ -z "$nondocs" ]; then
            echo "docs-only change -- the e2e test step will be skipped:"
            printf '%s\n' "$files" | sed 's/^/  doc: /'
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "non-docs changes present -- e2e will run. Non-docs files:"
            printf '%s\n' "$nondocs" | sed 's/^/  code: /'
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build corpus & run E2E (incl. offline-mode test)
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          node web/build.mjs
          npx playwright test e2e/ --config e2e/playwright.config.js
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-traces
          path: test-results/

  # ── Stage 4.5: the single required status check ──────────────────────
  # GitHub's branch protection treats a SKIPPED job as satisfying a
  # required check, not as a failure. That let a red `playground` job
  # (which skips its downstream `e2e` via `needs:`) through auto-merge
  # anyway, since only `e2e` itself was configured as required and
  # "skipped" reads as "passed" to GitHub. This job is the fix: it
  # depends on every currently-active job, runs unconditionally via
  # `if: always()` (so it still runs even when an upstream job failed or
  # was skipped, rather than being skipped itself the same way), and
  # explicitly fails if any of them isn't a genuine "success". Point
  # branch protection's required check at THIS job, not at e2e directly
  # -- see the repo's Settings > Branches (not something this workflow
  # file can configure by itself). Deliberately no `name:` field here --
  # GitHub then reports it under the job id itself ("ci-status-gate"),
  # so the string typed into Settings > Branches, the job id in this
  # file, and what actually gets reported are all the same one string,
  # not two that can silently drift apart.
  #
  # matrix, security, and codeql are now ENABLED and REQUIRED -- each runs
  # on every PR and this gate fails unless all report "success". (While any
  # was disabled via if: ${{ false }} its result was always "skipped",
  # which this gate treats as failure, so it could not be listed here
  # without permanently blocking merges. Re-disabling one means dropping it
  # from needs below in the SAME change.)
  ci-status-gate:
    timeout-minutes: 5
    needs: [lint, corpus, matrix, security, codeql, playground, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        run: |
          echo "lint:       ${{ needs.lint.result }}"
          echo "corpus:     ${{ needs.corpus.result }}"
          echo "matrix:     ${{ needs.matrix.result }}"
          echo "security:   ${{ needs.security.result }}"
          echo "codeql:     ${{ needs.codeql.result }}"
          echo "playground: ${{ needs.playground.result }}"
          echo "e2e:        ${{ needs.e2e.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.corpus.result }}" != "success" ] || \
             [ "${{ needs.matrix.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.codeql.result }}" != "success" ] || \
             [ "${{ needs.playground.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::One or more required CI jobs did not succeed (see results above) -- this must block merge"
            exit 1
          fi
          echo "All required jobs succeeded."

  # ── Stage 5: security ────────────────────────────────────────────────
  security:
    timeout-minutes: 20
    permissions:
      security-events: write   # upload the Trivy SARIF to the Security tab
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Trivy report (all severities, non-blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25   # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"
          scanners: vuln,secret
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy report to the Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: trivy.sarif
          category: trivy
      - name: Trivy enforce (MEDIUM/HIGH/CRITICAL, blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25   # v0.36.0
        env:
          # Reuse the vuln DB the report step already fetched -- no second
          # download, so the two steps cost roughly one scan's worth of work.
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true
        with:
          scan-type: fs
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "1"
          scanners: vuln,secret
          skip-setup-trivy: true   # trivy already installed by the report step

  # ── Stage 6: CodeQL static analysis ──────────────────────────────────
  # Moved in from the old standalone codeql.yml: a SEPARATE workflow cannot
  # be a dependency of ci-status-gate, and this must be gate-required now.
  # Job-level permissions grant the security-events write CodeQL needs
  # without widening the workflow-level default (contents: read).
  codeql:
    timeout-minutes: 25
    needs: [lint, corpus]
    permissions:
      security-events: write
      contents: read
      actions: read
      pull-requests: read   # read changed-file list to skip CodeQL when no scanned source changed
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Determine if ${{ matrix.language }} sources changed (gates CodeQL init/analyze)
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # codeql_skippable=true when no changed file is a source CodeQL scans for THIS
          # language (JS/TS: js/jsx/ts/tsx/mjs/cjs/html; Python: py/pyi + pyproject.toml).
          # Any uncertainty (API error, empty/unknown event) -> false, so CodeQL runs.
          # Only init/analyze are gated: the JOB still runs and reports "success" (skipped
          # steps do not make a job "skipped"), so ci-status-gate passes on a skip and still
          # blocks if a real analysis fails.
          set -uo pipefail
          case "${{ matrix.language }}" in
            javascript-typescript) rx='\.(js|jsx|ts|tsx|mjs|cjs|html|htm)$' ;;
            python) rx='\.pyi?$|(^|/)pyproject\.toml$' ;;
            *) rx='.' ;;   # unknown language -> match everything -> never skip
          esac
          files=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' 2>/dev/null)" || files="__ERR__"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            case "$base" in *[!0]*) : ;; *) base="" ;; esac   # all-zero base (new ref) -> unknown
            if [ -n "$base" ]; then
              files="$(gh api "repos/${{ github.repository }}/compare/${base}...${{ github.sha }}" --jq '.files[].filename' 2>/dev/null)" || files="__ERR__"
            else
              files="__ERR__"
            fi
          else
            files="__ERR__"
          fi
          if [ "$files" = "__ERR__" ] || [ -z "$files" ]; then
            echo "changed-file list unavailable/empty -- running CodeQL to be safe"
            echo "codeql_skippable=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          hits="$(printf '%s\n' "$files" | grep -E "$rx" || true)"
          if [ -z "$hits" ]; then
            echo "no ${{ matrix.language }} source changed -- CodeQL analysis will be skipped:"
            printf '%s\n' "$files" | sed 's/^/  unscanned: /'
            echo "codeql_skippable=true" >> "$GITHUB_OUTPUT"
          else
            echo "${{ matrix.language }} source changed -- CodeQL will run:"
            printf '%s\n' "$hits" | sed 's/^/  code: /'
            echo "codeql_skippable=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: steps.scope.outputs.codeql_skippable != 'true'
        with: { languages: "${{ matrix.language }}" }
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: steps.scope.outputs.codeql_skippable != 'true'
