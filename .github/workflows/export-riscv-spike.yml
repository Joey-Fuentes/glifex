# THROWAWAY spike round 3 -- RISC-V RV64GC. Never merged.
#
# ROUND 2 SETTLED THE BIG ONE: libriscv BUILDS TO WASM. Their examples/wasm
# produced a real wasm_example.wasm. Bx-10 began from "nobody has ever built
# VIXL to wasm"; this begins from a working build.
#
# Round 2 also read the REAL API out of the headers (round 1 searched for
# set_XPR/get_XPR -- names I invented, which proved nothing):
#   cpu.reg(idx)   -> auto&    read AND write
#   cpu.pc() / cpu.jump()
#   cpu.step_one(bool use_instruction_counter = true)     <-- VIXL's ExecuteInstruction
#   machine.simulate_with(max, counter, pc)               <-- VIXL's RunFrom
# step_one even takes an instruction counter natively, which IS the det-tier
# metric. cireg(idx) -> get(idx+8) confirms the C extension is first-class.
#
# ROUND 2's ONE FAILURE WAS MINE: I hand-rolled emcc -I lib/ and died on
#   fatal error: 'libriscv_settings.h' file not found
# That header is GENERATED BY THEIR CMAKE. Round 3 builds THROUGH their build
# system instead of around it.
#
# ONE DESIGN DIFFERENCE FROM Bx-10, tested rather than assumed: VIXL treated a
# guest address as a raw host pointer, so we relocated PT_LOADs into a malloc'd
# base ourselves. libriscv owns its memory and takes an ELF. That suits RISC-V
# better anyway -- round 1 measured R_RISCV_RVC_BRANCH/RVC_JUMP on purely LOCAL
# branches (linker relaxation, no aarch64 analogue), so the linker is mandatory
# here, and we already build and ship ld.
#
# THE GATE: assemble+link add.s, load the ELF, set a0=7/a1=5, jump to kata,
# single-step to ret, read a0. 12 means the track has an emulator.
name: export-riscv-spike

on:
  workflow_dispatch:
  push:
    branches: [chore/export-riscv-spike-*]

permissions:
  contents: read

jobs:
  spike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-riscv64-linux-gnu build-essential cmake file
          riscv64-linux-gnu-as --version | head -1

      - name: Install emsdk
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          cd "$HOME/emsdk" && ./emsdk install latest && ./emsdk activate latest
          echo "EMSDK=$HOME/emsdk" >> "$GITHUB_ENV"
          . "$HOME/emsdk/emsdk_env.sh" && emcc --version | head -1

      - name: Build the wrapper through libriscv's own CMake
        run: |
          . "$HOME/emsdk/emsdk_env.sh"
          bash tools/riscv-spike/build.sh "$GITHUB_WORKSPACE/rv"

      - name: Assemble and link the katas
        continue-on-error: true
        run: |
          mkdir -p "$GITHUB_WORKSPACE/rv/katas"
          for f in tools/riscv-spike/katas/*.s; do
            b=$(basename "$f" .s)
            riscv64-linux-gnu-as -march=rv64gc "$f" -o "${TMPDIR:-/tmp}/$b.o" 2>&1 || { echo "  $b ASSEMBLE FAILED"; continue; }
            # RISC-V needs the link even for local branches -- relaxation.
            riscv64-linux-gnu-ld "${TMPDIR:-/tmp}/$b.o" -o "$GITHUB_WORKSPACE/rv/katas/$b.elf" -e kata -z max-page-size=4096 2>&1 \
              || { echo "  $b LINK FAILED"; continue; }
            echo "  $b  elf=$(stat -c%s "$GITHUB_WORKSPACE/rv/katas/$b.elf") bytes"
            riscv64-linux-gnu-objdump -d "$GITHUB_WORKSPACE/rv/katas/$b.elf" 2>/dev/null | sed -n '/<kata>:/,/^$/p' | head -8 | sed 's/^/     /'
          done

      - uses: actions/setup-node@v4
        with: { node-version: "24" }

      - name: THE GATE -- drive add.elf register-by-register
        run: |
          node tools/riscv-spike/drive.mjs "$GITHUB_WORKSPACE/rv" "$GITHUB_WORKSPACE/rv/katas/add.elf" 12

      - name: And the rest -- memops, loop, the auipc relocation boundary
        continue-on-error: true
        run: |
          # loop: sum of squares 1..5 = 55, same kata Bx-10 used on the Pixel.
          node tools/riscv-spike/drive.mjs "$GITHUB_WORKSPACE/rv" "$GITHUB_WORKSPACE/rv/katas/loop.elf" 55 || echo "## loop did not drive"
          # auipc: the adrp/:lo12: analogue. Does a linked PC-relative pair work?
          node tools/riscv-spike/drive.mjs "$GITHUB_WORKSPACE/rv" "$GITHUB_WORKSPACE/rv/katas/auipc.elf" 1234605616436508552 || echo "## auipc did not drive -- the relocation boundary"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: riscv-spike-3
          if-no-files-found: warn
          path: |
            rv/
            tools/riscv-spike/katas/*.s
