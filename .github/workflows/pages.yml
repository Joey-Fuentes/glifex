name: Deploy Pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency: { group: pages, cancel-in-progress: false }   # queue, don't cancel: cancelling mid-deploy orphans a server-side Pages deployment that blocks successors

jobs:
  # Split build/deploy: a re-run of the deploy job no longer re-uploads the
  # artifact, so the "multiple artifacts named github-pages" failure mode
  # from launch day is structurally impossible now.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Vendor WASM runtimes
        run: node web/fetch-runtimes.mjs
      - name: Vendor C toolchain (@wasmer/sdk + clang.webc)
        run: |
          mkdir -p web/vendor/c
          VER=0.8.0-beta.1
          npm pack @wasmer/sdk@${VER}
          tar xzf wasmer-sdk-*.tgz
          cp -r package/dist/. web/vendor/c/
          rm -rf package wasmer-sdk-*.tgz
          curl https://get.wasmer.io -sSfL | sh
          export PATH="$HOME/.wasmer/bin:$PATH"
          wasmer package download clang/clang -o web/vendor/c/clang.webc
          echo '{"runtime":"c","via":"wasmer"}' > web/vendor/c/manifest.json
          ls -la web/vendor/c
      - run: node web/build.mjs
      - name: Stamp document version (badge reports the page it lives in)
        run: |
          STAMP=$(date -u +%Y.%m.%d-%H%M)
          SHA=${GITHUB_SHA::7}
          sed -i "s/<meta name=\"glifex-version\" content=\"dev\" \/>/<meta name=\"glifex-version\" content=\"$STAMP\" \/>/" web/index.html
          sed -i "s/<meta name=\"glifex-commit\" content=\"local\" \/>/<meta name=\"glifex-commit\" content=\"$SHA\" \/>/" web/index.html
          # B2: content-stamp asset URLs (?v=<sha>) + self-version the SW cache.
          node web/stamp.mjs "$SHA"
          grep glifex-version web/index.html && grep -m1 "app.js?v=" web/index.html && grep "const CACHE" web/sw.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: web }

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
