name: Deploy Pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency: { group: pages, cancel-in-progress: true }

jobs:
  # Split build/deploy: a re-run of the deploy job no longer re-uploads the
  # artifact, so the "multiple artifacts named github-pages" failure mode
  # from launch day is structurally impossible now.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: node web/build.mjs
      - name: Stamp document version (badge reports the page it lives in)
        run: |
          STAMP=$(date -u +%Y.%m.%d-%H%M)
          SHA=${GITHUB_SHA::7}
          sed -i "s/<meta name=\"glifex-version\" content=\"dev\" \/>/<meta name=\"glifex-version\" content=\"$STAMP\" \/>/" web/index.html
          sed -i "s/<meta name=\"glifex-commit\" content=\"local\" \/>/<meta name=\"glifex-commit\" content=\"$SHA\" \/>/" web/index.html
          grep glifex-version web/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: web }

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
