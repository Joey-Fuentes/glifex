name: scout-signing-key

# Read-only DISCOVER-and-COMPARE for a signing-key fingerprint. MANUAL ONLY.
# Each independent source produces its OWN fingerprint; the job prints them side
# by side and asserts they converge -- so the fingerprint comes OUT of the run,
# you never paste it in as an assumption. It COMMITS NOTHING, uploads no
# artifact, opens no PR. A human still reads the table and makes the trust call.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "signer email to look up (identity/curated sources)"
        required: true
        default: "sjames@sourceware.org"
      binutils_version:
        description: "binutils release whose signature anchors the discovery"
        required: true
        default: "2.43"
      gcc_version:
        description: "optional GCC release for cross-project corroboration (blank to skip)"
        required: false
        default: ""
      expected_fpr:
        description: "optional: if set, assert the converged fingerprint equals this"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: scout-signing-key-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Discover and compare the signing fingerprint across sources
        env:
          EMAIL: ${{ inputs.email }}
          BU_VER: ${{ inputs.binutils_version }}
          GCC_VER: ${{ inputs.gcc_version }}
          EXPECT_FPR: ${{ inputs.expected_fpr }}
        run: |
          set -uo pipefail
          
          RESULTS="$(mktemp)"      # tab-separated: <source>  <fpr|status>  <weight>
          FPRS="$(mktemp)"         # discovered fingerprints only (for convergence)
          record() { printf '%s\t%s\t%s\n' "$1" "$2" "$3" >> "$RESULTS"; }
          fp_of() { awk -F: '/^fpr:/{print $10; exit}'; }   # primary fpr from --with-colons
          iso() { local h; h="$(mktemp -d)"; chmod 700 "$h"; printf '%s' "$h"; }
          
          echo "Discovering the binutils signing fingerprint from independent sources."
          echo "Signer email under test: $EMAIL   binutils: $BU_VER   gcc: ${GCC_VER:-<skip>}"
          echo
          
          # --- Source 1: keys.openpgp.org, looked up BY EMAIL (verified-address) --------
          H="$(iso)"
          if GNUPGHOME="$H" gpg --batch --keyserver hkps://keys.openpgp.org --locate-external-keys "$EMAIL" >/dev/null 2>&1; then
            f="$(GNUPGHOME="$H" gpg --batch --with-colons --list-keys "$EMAIL" 2>/dev/null | fp_of)"
            if [ -n "$f" ]; then record "keys.openpgp.org(by email)" "$f" "identity"; echo "$f" >> "$FPRS"
            else record "keys.openpgp.org(by email)" "no-verified-key" "identity"; fi
          else
            record "keys.openpgp.org(by email)" "unreachable/none" "identity"
          fi
          
          # --- Source 2: GNU keyring, looked up by email (curated) ----------------------
          H="$(iso)"; KR="$H/gnu-keyring.gpg"
          if curl -fsSL --retry 3 https://ftp.gnu.org/gnu/gnu-keyring.gpg -o "$KR" 2>/dev/null; then
            f="$(gpg --batch --no-default-keyring --keyring "$KR" --with-colons --list-keys "$EMAIL" 2>/dev/null | fp_of)"
            if [ -n "$f" ]; then record "gnu-keyring.gpg" "$f" "curated"; echo "$f" >> "$FPRS"
            else record "gnu-keyring.gpg" "not-present(sourceware, ok)" "curated"; fi
          else
            record "gnu-keyring.gpg" "unreachable" "curated"
          fi
          
          # --- Source 3: the REAL binutils release signature (release-anchored) ---------
          # Start from the release, not from a claimed identity: read the issuer off the
          # signature, fetch that key, and read the primary fp it verifies under.
          bu_fpr=""; bu_status="unreachable"
          H="$(iso)"; d="$(mktemp -d)"
          if curl -fsSL --retry 5 --retry-all-errors "https://ftp.gnu.org/gnu/binutils/binutils-${BU_VER}.tar.xz" -o "$d/t.xz" \
             && curl -fsSL --retry 5 --retry-all-errors "https://ftp.gnu.org/gnu/binutils/binutils-${BU_VER}.tar.xz.sig" -o "$d/t.xz.sig"; then
            iss="$(gpg --list-packets "$d/t.xz.sig" 2>/dev/null | grep -oE 'issuer fpr v4 [0-9A-Fa-f]+' | awk '{print $4}' | head -1)"
            [ -n "$iss" ] || iss="$(gpg --list-packets "$d/t.xz.sig" 2>/dev/null | grep -oE 'issuer key ID [0-9A-Fa-f]+' | awk '{print $4}' | head -1)"
            if [ -n "$iss" ] && GNUPGHOME="$H" gpg --batch --keyserver hkps://keys.openpgp.org --recv-keys "$iss" >/dev/null 2>&1; then
              st="$(GNUPGHOME="$H" gpg --batch --status-fd 1 --verify "$d/t.xz.sig" "$d/t.xz" 2>/dev/null || true)"
              if printf '%s\n' "$st" | grep -q '^\[GNUPG:\] GOODSIG' && ! printf '%s\n' "$st" | grep -qE '^\[GNUPG:\] (REVKEYSIG|EXPKEYSIG|EXPSIG)'; then
                bu_fpr="$(printf '%s\n' "$st" | awk '/^\[GNUPG:\] VALIDSIG/{print $12; exit}')"
                bu_status="GOOD"
                [ -n "$bu_fpr" ] && echo "$bu_fpr" >> "$FPRS"
              else
                bu_status="signature-not-good"
              fi
            else
              bu_status="issuer-unresolvable"
            fi
          fi
          record "binutils-${BU_VER} release" "${bu_fpr:-$bu_status}" "RELEASE"
          
          # --- Source 4: cross-project GCC release (same key signs another project) ------
          if [ -n "${GCC_VER:-}" ]; then
            gcc_fpr=""; gcc_status="unreachable"
            H="$(iso)"; d="$(mktemp -d)"; base="https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VER}"
            if curl -fsSL --retry 5 --retry-all-errors "$base/gcc-${GCC_VER}.tar.xz" -o "$d/g.xz" \
               && curl -fsSL --retry 5 --retry-all-errors "$base/gcc-${GCC_VER}.tar.xz.sig" -o "$d/g.xz.sig"; then
              iss="$(gpg --list-packets "$d/g.xz.sig" 2>/dev/null | grep -oE 'issuer fpr v4 [0-9A-Fa-f]+' | awk '{print $4}' | head -1)"
              if [ -n "$iss" ] && GNUPGHOME="$H" gpg --batch --keyserver hkps://keys.openpgp.org --recv-keys "$iss" >/dev/null 2>&1; then
                st="$(GNUPGHOME="$H" gpg --batch --status-fd 1 --verify "$d/g.xz.sig" "$d/g.xz" 2>/dev/null || true)"
                if printf '%s\n' "$st" | grep -q '^\[GNUPG:\] GOODSIG'; then
                  gcc_fpr="$(printf '%s\n' "$st" | awk '/^\[GNUPG:\] VALIDSIG/{print $12; exit}')"; gcc_status="GOOD"
                  [ -n "$gcc_fpr" ] && echo "$gcc_fpr" >> "$FPRS"
                else gcc_status="signature-not-good"; fi
              else gcc_status="issuer-unresolvable"; fi
            fi
            record "gcc-${GCC_VER} release" "${gcc_fpr:-$gcc_status}" "cross-project"
          fi
          
          # --- report -------------------------------------------------------------------
          echo "================ DISCOVERED FINGERPRINTS ================"
          printf '  %-28s %-42s %s\n' "SOURCE" "FINGERPRINT / STATUS" "WEIGHT"
          while IFS="$(printf '\t')" read -r s v w; do printf '  %-28s %-42s %s\n' "$s" "$v" "$w"; done < "$RESULTS"
          echo
          
          uniq_fprs="$(sort -u "$FPRS" | grep -E '^[0-9A-Fa-f]{40}$' || true)"
          n_uniq="$(printf '%s\n' "$uniq_fprs" | grep -c . || true)"
          echo "================ VERDICT ================"
          if [ "$bu_status" != "GOOD" ]; then
            echo "::error::the binutils release did not yield a good signature -- cannot anchor. Nothing to accept."
            exit 1
          fi
          if [ "$n_uniq" -eq 1 ]; then
            echo "CONVERGED. Every reachable source that produced a fingerprint agrees:"
            echo
            echo "    $uniq_fprs"
            echo
            echo "This is the fingerprint that (a) signs the real binutils-${BU_VER} release and"
            echo "(b) matches the identity/curated sources above. Read the table, and if you are"
            echo "satisfied the sources are genuinely independent, THIS is the value to commit as"
            echo "BINUTILS_SIGNING_FPR (and the key as tools/keys/binutils-signing.asc)."
            if [ -n "${EXPECT_FPR:-}" ]; then
              e="$(printf '%s' "$EXPECT_FPR" | tr -d ' ' | tr '[:lower:]' '[:upper:]')"
              u="$(printf '%s' "$uniq_fprs" | tr '[:lower:]' '[:upper:]')"
              if [ "$e" = "$u" ]; then echo; echo "(matches the expected_fpr you supplied.)"
              else echo; echo "::error::converged fingerprint does NOT match the expected_fpr you supplied."; exit 1; fi
            fi
            echo
            echo "Not automated here -- also eyeball: Gentoo dev keyring, and the binutils"
            echo "release announcement on the sourceware mailing list."
            exit 0
          else
            echo "::error::SOURCES DISAGREE -- found $n_uniq distinct fingerprints:"
            printf '%s\n' "$uniq_fprs" | sed 's/^/    /'
            echo "Do not trust any of them until this is resolved."
            exit 1
          fi
