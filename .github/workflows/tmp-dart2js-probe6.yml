name: tmp-dart2js-probe6
# TEMPORARY. Throwaway. Do not merge to main; delete the branch when done.
#
# THE DEFECT. pkg/kernel/lib/binary/ast_from_binary.dart, readName, from
# e3d4fbec80c (Jens Johansen, 2022-11-01, "[kernel] Deduplicate Names when
# loading dill"):
#
#     nameCacheIndex = stringReference | ((libraryReferenceIndex) << 30);
#
# Both bitwise operators are 32-bit on web targets, so the key keeps only
# libraryReferenceIndex & 3. Two libraries congruent mod 4 collide and the
# cache returns the Name built for whichever was read first.
#
# THE FIX. _nameCache is a Map, so the key never needed to be a packed
# int. Use a record: exact on every platform, no arithmetic.
#
# WHAT v5 LEFT OPEN, and why this run exists before glifex changes its pin:
#   - v5 looked up ONE member. The thing that actually crashes is
#     SharedInteropTransformer resolving ~20 eagerly and unguarded in its
#     constructor. Check all of them, from its own source.
#   - v5 compared skip COUNTS. Two sets can both be 90 and differ. Compare
#     the sets.
#   - v5 showed _isJSObject resolves on main unpatched -- but 1651 members
#     are still misattributed there. If any of the ~20 is among them, main
#     crashes too. Nobody should lean on "main is fine" until this runs.
#   - a CL has to analyze clean.

on:
  push:
    branches: [chore/tmp-dart2js-probe6-20260717]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        sdk: ["3.12.2", "main"]
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Versions and the kernel revision to match
        # package:kernel and the dill must come from the same revision or
        # the reader rejects the binary format -- a failure that looks like
        # a bug and is not.
        run: |
          set -eux
          dart --version
          node --version
          if [ "${{ matrix.sdk }}" = "3.12.2" ]; then
            KREF="3.12.2"
          elif [ -f "$DART_HOME/revision" ]; then
            KREF="$(cat "$DART_HOME/revision")"
          else
            echo "NOTE -- no revision file; falling back to main. If the"
            echo "reader rejects the dill, that is drift, not the bug."
            KREF="main"
          fi
          echo "KREF=$KREF" >> "$GITHUB_ENV"

      - name: Sparse-clone pkg/kernel and pkg/_js_interop_checks
        run: |
          set -eux
          cd "$RUNNER_TEMP"
          mkdir -p k && cd k
          git init -q
          git remote add origin https://github.com/dart-lang/sdk.git
          git fetch -q --depth 1 --filter=blob:none origin "$KREF"
          git sparse-checkout init --cone
          git sparse-checkout set pkg/kernel pkg/_js_interop_checks
          git checkout -q FETCH_HEAD
          git rev-parse HEAD | tee "$RUNNER_TEMP/kernel-sha.txt"
          cp -r "$RUNNER_TEMP/k/pkg/kernel" "$RUNNER_TEMP/kernel-pristine"
          cp -r "$RUNNER_TEMP/k/pkg/kernel" "$RUNNER_TEMP/kernel-patched"

      - name: Apply the record key to the patched copy
        run: |
          set -eu
          mkdir -p "$GITHUB_WORKSPACE/probe-out"
          python3 - "$RUNNER_TEMP/kernel-patched/lib/binary/ast_from_binary.dart" <<'PY'
          import sys
          p = sys.argv[1]
          src = open(p, encoding="utf-8").read()
          edits = [
            ("late Map<int, Name?> _nameCache;",
             "late Map<(int, int), Name?> _nameCache;"),
            ("    final int nameCacheIndex;",
             "    final (int, int) nameCacheIndex;"),
            ("      nameCacheIndex = stringReference | ((libraryReferenceIndex) << 30);",
             "      nameCacheIndex = (stringReference, libraryReferenceIndex);"),
            ("      nameCacheIndex = stringReference;",
             "      nameCacheIndex = (stringReference, 0);"),
          ]
          for old, new in edits:
              n = src.count(old)
              if n != 1:
                  sys.stderr.write("ANCHOR NOT UNIQUE (" + str(n) + "): " + old + "\n")
                  sys.exit(1)
              src = src.replace(old, new)
          open(p, "w", encoding="utf-8").write(src)
          print("patch applied: 4 edits, each unique")
          PY
          diff -u "$RUNNER_TEMP/kernel-pristine/lib/binary/ast_from_binary.dart" \
                  "$RUNNER_TEMP/kernel-patched/lib/binary/ast_from_binary.dart" \
            > "$GITHUB_WORKSPACE/probe-out/the-fix.diff" || true
          cat "$GITHUB_WORKSPACE/probe-out/the-fix.diff"

      - name: Extract the real eager member list
        # The crash comes from SharedInteropTransformer resolving members
        # in its constructor. Take the list from its own source rather than
        # from memory. If the regexes find nothing, dump the file so the
        # next probe is written against fact -- the v3 lesson.
        run: |
          set -eu
          python3 - <<'PY'
          import re, os, sys
          root = os.environ["RUNNER_TEMP"]
          base = root + "/k/pkg/_js_interop_checks/lib/src/transformations"
          hits = []
          files = []
          for dirpath, _, names in os.walk(root + "/k/pkg/_js_interop_checks"):
              for n in names:
                  if n.endswith(".dart"):
                      files.append(os.path.join(dirpath, n))
          src_all = {}
          for f in files:
              src_all[f] = open(f, encoding="utf-8", errors="replace").read()

          # LibraryIndex API shapes: getProcedure(lib, class, member),
          # getTopLevelProcedure(lib, member), getClass(lib, class), ...
          pats = [
            (r"getTopLevelProcedure\(\s*'([^']+)'\s*,\s*'([^']+)'", 2),
            (r"getProcedure\(\s*'([^']+)'\s*,\s*'([^']+)'\s*,\s*'([^']+)'", 3),
          ]
          for f, s in src_all.items():
              for pat, arity in pats:
                  for m in re.finditer(pat, s):
                      g = m.groups()
                      if arity == 2:
                          hits.append((g[0], "::", g[1], os.path.basename(f)))
                      else:
                          hits.append((g[0], g[1], g[2], os.path.basename(f)))

          hits = sorted(set(hits))
          out = root + "/eager.txt"
          with open(out, "w") as fh:
              for lib, cls, mem, src in hits:
                  fh.write(lib + "|" + cls + "|" + mem + "|" + src + "\n")
          print("eager member lookups found:", len(hits))
          for h in hits:
              print("  ", h[0], h[1], h[2], "  <-", h[3])

          if not hits:
              print()
              print("NO HITS -- the API shape is different. Dumping the")
              print("transformer so the next probe is written against fact:")
              t = base + "/shared_interop_transformer.dart"
              if os.path.exists(t):
                  print(open(t, encoding="utf-8", errors="replace").read()[:6000])
              else:
                  print("(not at the expected path; files seen:)")
                  for f in sorted(src_all):
                      print("   ", f)
          PY
          cp "$RUNNER_TEMP/eager.txt" "$GITHUB_WORKSPACE/probe-out/eager-members.txt" 2>/dev/null || true

      - name: Write the probe packages
        run: |
          set -eux
          for V in pristine patched; do
            P="$RUNNER_TEMP/probe-$V"
            mkdir -p "$P/lib" "$P/bin"
            cat > "$P/pubspec.yaml" <<EOF
          name: probe
          publish_to: none
          environment:
            sdk: ">=3.0.0 <5.0.0"
          dependencies:
            kernel:
              path: ../kernel-$V
          EOF
          done

          # The eager list becomes Dart source both runs share.
          python3 - <<'PY'
          import os
          root = os.environ["RUNNER_TEMP"]
          rows = []
          p = root + "/eager.txt"
          if os.path.exists(p):
              for line in open(p):
                  line = line.rstrip("\n")
                  if not line:
                      continue
                  lib, cls, mem, _src = line.split("|")
                  rows.append("  ('" + lib + "', '" + cls + "', '" + mem + "'),")
          body = ("const List<(String, String, String)> eagerMembers = [\n"
                  + "\n".join(rows) + "\n];\n")
          open(root + "/eager_members.dart", "w").write(body)
          print("eager_members.dart rows:", len(rows))
          PY

          cat > "$RUNNER_TEMP/trace.dart" <<'EOF'
          import 'dart:collection';
          import 'dart:typed_data';

          import 'package:kernel/ast.dart';
          import 'package:kernel/binary/ast_from_binary.dart';
          import 'package:kernel/library_index.dart';
          import 'package:probe/dill_bytes.dart';
          import 'package:probe/eager_members.dart';

          Set<Name> identitySet() => LinkedHashSet<Name>(
              equals: identical, hashCode: identityHashCode);

          class DiagBuilder extends BinaryBuilder {
            DiagBuilder(Uint8List bytes) : super(bytes);
            final List<Name> names = <Name>[];
            @override
            Name readName() {
              final Name n = super.readName();
              if (n.isPrivate) names.add(n);
              return n;
            }
          }

          bool wouldBeSkipped(Member m, Library owner) =>
              m.name.isPrivate && m.name.library != owner;

          Iterable<Member> membersOf(Library lib) sync* {
            yield* lib.procedures;
            yield* lib.fields;
            for (final c in lib.classes) {
              yield* c.procedures;
              yield* c.fields;
              yield* c.constructors;
            }
          }

          String libOf(Library? l) => l == null ? 'null' : l.importUri.toString();

          void main() {
            final component = Component();
            final b = DiagBuilder(Uint8List.fromList(dillBytes));
            b.readComponent(component);

            final pairs = <String>{};
            final all = identitySet();
            for (final n in b.names) {
              pairs.add(n.text + '@' + libOf(n.library));
              all.add(n);
            }
            print('private name reads:             ' + b.names.length.toString());
            print('distinct (text, library) pairs: ' + pairs.length.toString());
            print('distinct Name objects:          ' + all.length.toString());

            // The FULL skip set, sorted. Counts can match while sets differ.
            final skipped = <String>[];
            for (final lib in component.libraries) {
              for (final m in membersOf(lib)) {
                if (!wouldBeSkipped(m, lib)) continue;
                skipped.add(m.name.text + ' @' + lib.importUri.toString() +
                    ' -> ' + libOf(m.name.library));
              }
            }
            skipped.sort();
            print('guard would skip:               ' + skipped.length.toString());

            // Every member the interop transformer resolves eagerly.
            final index = LibraryIndex.all(component);
            int ok = 0;
            int bad = 0;
            final failures = <String>[];
            for (final e in eagerMembers) {
              final lib = e.$1;
              final cls = e.$2;
              final mem = e.$3;
              try {
                index.getProcedure(lib, cls, mem);
                ok++;
              } catch (_) {
                bad++;
                failures.add('  MISSING ' + lib + ' ' + cls + ' ' + mem);
              }
            }
            failures.sort();
            print('eager members checked:          ' + eagerMembers.length.toString());
            print('eager members resolved:         ' + ok.toString());
            print('eager members MISSING:          ' + bad.toString());
            for (final f in failures) {
              print(f);
            }

            print('');
            print('--- full skip set ---');
            for (final s in skipped) {
              print(s);
            }
          }
          EOF

          D="$DART_HOME/lib/_internal/dart2js_platform.dill"
          ls -l "$D"
          node -e 'const fs = require("fs"); const b = fs.readFileSync(process.argv[1]); fs.writeFileSync(process.argv[2], "const List<int> dillBytes = <int>[" + Array.from(b).join(",") + "];\n");' "$D" "$RUNNER_TEMP/dill_bytes.dart"

          for V in pristine patched; do
            cp "$RUNNER_TEMP/trace.dart" "$RUNNER_TEMP/probe-$V/bin/trace.dart"
            cp "$RUNNER_TEMP/dill_bytes.dart" "$RUNNER_TEMP/probe-$V/lib/dill_bytes.dart"
            cp "$RUNNER_TEMP/eager_members.dart" "$RUNNER_TEMP/probe-$V/lib/eager_members.dart"
            (cd "$RUNNER_TEMP/probe-$V" && dart pub get)
          done

      - name: Analyzer on the patched kernel
        # A CL has to compile clean. Informational -- kernel may carry
        # pre-existing lints that are not ours.
        continue-on-error: true
        run: |
          set -eu
          cd "$RUNNER_TEMP/probe-patched"
          dart analyze "$RUNNER_TEMP/kernel-patched/lib/binary/ast_from_binary.dart" 2>&1 \
            | tee "$GITHUB_WORKSPACE/probe-out/analyze.txt" || true

      - name: Run the 2x2
        continue-on-error: true
        run: |
          set -eux
          O="$GITHUB_WORKSPACE/probe-out"
          for V in pristine patched; do
            cd "$RUNNER_TEMP/probe-$V"
            dart run bin/trace.dart > "$O/$V-vm.txt" 2>&1 || echo "VM $V FAILED" >> "$O/$V-vm.txt"
            dart compile js -o "$RUNNER_TEMP/$V.js" bin/trace.dart
            node --max-old-space-size=6144 -e 'globalThis.self = globalThis; require(process.argv[1]);' "$RUNNER_TEMP/$V.js" > "$O/$V-js.txt" 2>&1 || echo "JS $V FAILED" >> "$O/$V-js.txt"
          done
          wc -l "$O"/*.txt

      - name: Verdict
        continue-on-error: true
        run: |
          set -eu
          O="$GITHUB_WORKSPACE/probe-out"
          KSHA="$(cat "$RUNNER_TEMP/kernel-sha.txt" 2>/dev/null || echo unknown)"
          head_of() { head -8 "$1" 2>/dev/null || echo "(missing)"; }

          echo "======== headline numbers (full sets are in the artifact) ========"
          for f in pristine-vm pristine-js patched-vm patched-js; do
            echo "---- $f"
            head_of "$O/$f.txt"
            echo
          done

          RC=0
          C="fail"; N="fail"; F="fail"; E="fail"
          diff -q "$O/pristine-vm.txt" "$O/pristine-js.txt" >/dev/null 2>&1 || C="ok"
          diff -q "$O/pristine-vm.txt" "$O/patched-vm.txt"  >/dev/null 2>&1 && N="ok"
          diff -q "$O/patched-vm.txt"  "$O/patched-js.txt"  >/dev/null 2>&1 && F="ok"
          if grep -q "eager members MISSING:          0" "$O/patched-js.txt" 2>/dev/null; then E="ok"; fi

          echo "======== assertions ========"
          echo "CONTROL  $C   unpatched dart2js must diverge from the VM"
          echo "NEUTRAL  $N   patched VM must equal unpatched VM"
          echo "FIX      $F   patched dart2js must equal the VM, full skip set"
          echo "EAGER    $E   every member the interop transformer resolves"
          echo "              eagerly must resolve under patched dart2js"
          for v in "$C" "$N" "$F" "$E"; do
            if [ "$v" != "ok" ]; then RC=1; fi
          done

          echo
          echo "======== does UNPATCHED dart2js crash on this SDK? ========"
          grep -E "eager members (checked|resolved|MISSING)" "$O/pristine-js.txt" 2>/dev/null || true
          echo "(MISSING > 0 means the interop transformer would throw.)"

          # A readable summary on the run page, linkable from an issue.
          {
            echo "## dart2js Name-cache key -- SDK ${{ matrix.sdk }}"
            echo
            echo "kernel revision: $KSHA"
            echo
            echo "| assertion | result |"
            echo "|---|---|"
            echo "| CONTROL -- unpatched dart2js diverges from VM | $C |"
            echo "| NEUTRAL -- patched VM == unpatched VM | $N |"
            echo "| FIX -- patched dart2js == VM (full skip set) | $F |"
            echo "| EAGER -- all interop members resolve when patched | $E |"
            echo
            echo "| run | skip | eager missing |"
            echo "|---|---|---|"
            for f in pristine-vm pristine-js patched-vm patched-js; do
              s=$(grep -m1 "guard would skip:" "$O/$f.txt" 2>/dev/null | tr -s ' ' | cut -d' ' -f5)
              m=$(grep -m1 "eager members MISSING:" "$O/$f.txt" 2>/dev/null | tr -s ' ' | cut -d' ' -f4)
              echo "| $f | ${s:-?} | ${m:-?} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

          echo
          if [ "$RC" = "0" ]; then
            echo "VERDICT -- the record key holds on SDK ${{ matrix.sdk }}."
          else
            echo "VERDICT -- something failed on SDK ${{ matrix.sdk }}. Read"
            echo "CONTROL first: a failed control means the rest says nothing."
          fi

      - name: Upload the probe output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart2js-probe6-${{ matrix.sdk }}
          path: probe-out
          if-no-files-found: warn
