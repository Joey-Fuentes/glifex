name = "cpp"
extension = "cpp"
practice_file = "practice.cpp"
detect = "g++ --version"
install_hint = "brew install gcc | apt install g++ | winget install BrendanH.G++ (or use WSL2)"
test_cmd = "g++ -std=c++20 -O2 -o .glifex_bin *.cpp && ./.glifex_bin {variant} < ../test_cases.json"
test_cmd_windows = "g++ -std=c++20 -O2 -o glifex_bin.exe *.cpp && .\\glifex_bin.exe {variant} < ..\\test_cases.json"
run_cmd = "g++ -std=c++20 -O2 -o .glifex_bin *.cpp && ./.glifex_bin {variant} < ../test_cases.json"
bench_cmd = "g++ -std=c++20 -O2 -o .glifex_bin *.cpp && ./.glifex_bin {variant} --bench < ../test_cases.json"
harness_template = "harness.cpp"
tool_version = "gcc 14"
stub = "#include \"solution.hpp\"\n\nValue {variant}(const Input& c) {\n    // TODO: implement -- return the answer for input c\n    (void)c;\n    return make_rc<JValue>();\n}\n"
support_files = ["solution.hpp", "json.hpp"]
