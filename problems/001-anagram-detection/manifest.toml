[problem]
title = "Anagram Detection"
difficulty = "easy"
tags = ["strings", "hash-map", "sorting"]

[languages]
python      = { variants = ["practice", "clean", "optimized"] }
javascript  = { variants = ["practice", "clean", "optimized"] }
typescript  = { variants = ["practice", "clean", "optimized"] }
go          = { variants = ["practice", "clean", "optimized"] }
java        = { variants = ["practice", "brute-force", "clean", "optimized"] }
kotlin      = { variants = ["practice", "clean", "optimized"] }
swift       = { variants = ["practice", "clean", "optimized"] }
ruby        = { variants = ["practice", "clean", "optimized"] }
csharp      = { variants = ["practice", "brute-force", "clean", "optimized"] }
cpp         = { variants = ["practice", "clean", "optimized"] }
c           = { variants = ["practice", "clean", "optimized"] }
rust        = { variants = ["practice", "brute-force", "clean", "optimized"] }
php         = { variants = ["practice", "clean", "optimized"] }
dart        = { variants = ["practice", "clean", "optimized"] }
zig         = { variants = ["practice", "clean", "optimized"] }
asm-x86_64  = { variants = ["practice", "brute-force", "clean", "optimized"] }
asm-arm64   = { variants = ["practice", "brute-force", "clean", "optimized"] }
asm-riscv64 = { variants = ["practice", "brute-force", "clean", "optimized"] }   # RV64GC (browser: guest as+ld under Blink, executed on libriscv)

[exclusions]
wat = "not-applicable: string inputs; WAT's contract is numeric-only"

# Worst-case time+space REQUIRED per declared variant.
# `default` covers all languages; per-language tables override.
[complexity.default.practice]
time = "O(n log n)"
space = "O(n)"
notes = "sort both strings, compare"
[complexity.default.clean]
time = "O(n log n)"
space = "O(n)"
[complexity.default.optimized]
time = "O(n)"
space = "O(1)"
notes = "counting table; O(1) under the fixed-alphabet convention"

[complexity.asm-x86_64.practice]
time = "O(n)"
space = "O(1)"
notes = "asm practice already uses the counting table"
[complexity.asm-arm64.practice]
time = "O(n)"
space = "O(1)"

[complexity.csharp.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "per-character count comparison -- the obvious baseline clean/optimized improve on"

[complexity.rust.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "per-char count compare -- the naive O(n^2) baseline"

[complexity.asm-x86_64.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "naive per-character count compare -- the O(n^2) baseline"
[complexity.asm-arm64.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "naive per-character count compare -- the O(n^2) baseline"
[complexity.asm-riscv64.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "naive per-character count compare -- the O(n^2) baseline"
[complexity.asm-riscv64.optimized]
time = "O(n)"
space = "O(1)"
notes = "same counting table as clean, plus an early exit the moment a slot goes negative. Ties clean on a true anagram (nothing to exit early from) and wins ~35% on the length-mismatch family"

[complexity.java.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "per-character count comparison -- the obvious baseline Clean/Optimized improve on"
