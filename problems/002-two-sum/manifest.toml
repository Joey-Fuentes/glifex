[complexity.default.practice]
time = "O(n)"
space = "O(n)"
notes = "single-pass hash map"
[complexity.default.clean]
time = "O(n)"
space = "O(n)"
[complexity.default.optimized]
time = "O(n)"
space = "O(n)"

[complexity.asm-arm64.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "every pair, no allocation -- the O(n^2) baseline"
[complexity.asm-riscv64.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "every pair, no allocation -- the O(n^2) baseline"
[complexity.asm-riscv64.optimized]
time = "O(n)"
space = "O(n)"
notes = "same stack-allocated hash map as clean, Fibonacci multiply-shift hash instead of masking the low bits -- shorter probe chains on clustered inputs"
[complexity.asm-arm64.optimized]
time = "O(n)"
space = "O(n)"
notes = "same hash map as clean, Fibonacci multiply-shift hash instead of masking the low bits -- shorter probe chains on clustered inputs"

[complexity.javascript.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop baseline -- the pedagogical starting point clean.js/optimized.js improve on"
[complexity.typescript.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop baseline -- the pedagogical starting point clean.ts/optimized.ts improve on"
[complexity.python.brute-force]
time = "O(n^2)"
