[complexity.ruby.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop baseline -- the pedagogical starting point clean.rb/optimized.rb improve on"
[complexity.php.brute-force]
time = "O(n^2)"
space = "O(1)"
