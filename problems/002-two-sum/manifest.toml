[complexity.c.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop brute force -- the pedagogical baseline (this was previously, incorrectly, sitting in clean.c)"
[complexity.cpp.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop baseline -- the pedagogical starting point clean.cpp/optimized.cpp improve on"
[complexity.wat.practice]
time = "O(n^2)"
space = "O(1)"
[complexity.wat.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop baseline -- the pedagogical starting point every other WAT approach here improves on"
[complexity.wat.clean]
time = "O(n)"
space = "O(n)"
notes = "open-addressing hash table in linear memory, fused lookup+insert loop, explicit full-table clear each call (see clean.wat's header comment for the design and why the clear was checked not to distort the O(n) measurement in practice)"
[complexity.wat.optimized]
time = "O(n)"
space = "O(n)"
notes = "a different hash-table design from clean.wat, not just a micro-optimized copy -- generation counter instead of an explicit clear, 2048 slots (headroom above clean.wat's exact-fit 1024) -- measured ~15-20% faster across multiple interleaved timing rounds, see optimized.wat's header comment"

[complexity.csharp.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop baseline -- the pedagogical starting point clean/optimized improve on"

[complexity.go.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop over every pair -- the O(n^2) baseline; allocates nothing"

[complexity.rust.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop over every pair -- the O(n^2) baseline"

[complexity.asm-x86_64.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop over every pair -- the O(n^2) baseline; clean/optimized use an mmap-backed hash table"

[complexity.java.brute-force]
time = "O(n^2)"
space = "O(1)"
notes = "nested-loop over every pair -- the O(n^2) baseline"
